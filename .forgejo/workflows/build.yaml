on:
  push:
    branches:
      - main
env:
  IMAGE: ghcr.io/devfaz/firefly-iii-dkb
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: docker
    container:
      image: node:25-trixie@sha256:6caf08ae7d5c8b8c3455161bee6ab84e658458cb0855f47172ccbe22c8be54ba
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - name: Prepare
        run: |-
          export DEBIAN_FRONTEND=noninteractive
          set -e -o pipefail -u
          apt -qqy update
          apt -qqy install docker.io
          echo ${{ secrets.MY_GITHUB_TOKEN }} | docker login --username devfaz --password-stdin $REGISTRY
          docker build -q -t ${IMAGE}:latest .
      - name: Setup Node.js
        uses: https://data.forgejo.org/actions/setup-node@v6
        with:
          node-version: "lts/*"          
      - name: Release
        run: |-
          npm install @semantic-release/exec -D
          npx semantic-release